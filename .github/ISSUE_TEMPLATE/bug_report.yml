name: Bug Report
description: Create a report to help us improve
body:
  - type: markdown
    attributes:
      value: |
        Before you open a new issue, search through the existing issues to see if others have had the same problem.

  - type: input
    id: version
    attributes:
      label: Version of the custom_component
      description: If you are not using the newest version, download and try that before opening an issue. Check const.py if unsure.
      placeholder: e.g., 1.2.3
    validations:
      required: true

  - type: input
    id: miner-model
    attributes:
      label: Miner Model
      description: The model of your mining hardware
      placeholder: e.g., Antminer S19 Pro, Whatsminer M30S++
    validations:
      required: true

  - type: input
    id: firmware-version
    attributes:
      label: Firmware Version
      description: The firmware version running on your miner
      placeholder: e.g., BraiinsOS 22.08, stock firmware 1.0.0
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: debug-log
    attributes:
      label: Debug log
      description: |
        To enable debug logs, see https://www.home-assistant.io/components/logger/
        Add this to your configuration.yaml:
        ```yaml
        logger:
          default: info
          logs:
            custom_components.miner: debug
        ```
      render: text
      placeholder: Paste your debug logs here
    validations:
      required: true
